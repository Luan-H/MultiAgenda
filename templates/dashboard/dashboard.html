{% extends 'base.html' %} 
{% load static %} 
{% block content %}
<div class="flex-grow-1 p-4 overflow-auto">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Painel</h3>
    <span>Bem-vindo, <strong>{{ nome_usuario }}</strong>!</span>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <div class="card shadow-sm p-3">
        <h6 class="card-subtitle mb-2 text-body-secondary">
          Agendamentos Hoje
        </h6>
        <h2 class="card-title mb-0">0</h2>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm p-3">
        <h6 class="card-subtitle mb-2 text-body-secondary">Clientes</h6>
        <h2 class="card-title mb-0">0</h2>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm p-3">
        <h6 class="card-subtitle mb-2 text-body-secondary">Profissionais</h6>
        <h2 class="card-title mb-0">0</h2>
      </div>
    </div>
  </div>

  <div class="card mt-4 shadow-sm">
    <div class="card-body">
      <h5 class="mb-3">Próximos Agendamentos</h5>

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Profissional</th>
              <th>Data</th>
              <th>Hora</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
