{% load static %}
<!doctype html>
<html lang="pt-br" data-bs-theme="dark">

<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <meta charset="UTF-8" />
  <title>MultiAgenda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background-color: #1a1d20 !important;
      background-image: linear-gradient(180deg,
          #212529 0%,
          #051937 100%) !important;
      background-attachment: fixed;
      background-size: cover;
    }

    .bg-body-tertiary {
      background-color: rgba(27, 30, 33, 0.95) !important;
    }

    .evento-calendario {
      font-size: 0.85rem;
      border-left: 4px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .evento-calendario:hover {
      transform: scale(1.02);
    }

    .card {
      background-color: rgba(33, 37, 41, 0.9) !important;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bg-body-tertiary {
      background-color: rgba(27, 30, 33, 0.95) !important;
    }

    .modal-content {
      background-color: var(--bs-body-bg) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: none !important;
    }

    .ui-card-glass {
      background-color: rgb(29, 32, 36) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }
  </style>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>
  <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" type="text/css" />

</head>

<body>
  <div class="d-flex" style="min-height: 100vh">
    {% include 'includes/navbar.html' %}

    <div class="flex-grow-1">
      {% block content %}
      {% endblock %}
    </div>
  </div>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    // A data continua usando o calendário em português nativo
    flatpickr(".campo-data", {
      dateFormat: "Y-m-d",
      altInput: true,
      altFormat: "d/m/Y",
      locale: "pt",
      allowInput: true
    });
    
    // PODE APAGAR A PARTE DO flatpickr(".campo-hora" ...) QUE FICAVA AQUI!
  });
</script>
</body>

</html>
