{% load static %} <!doctype html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Login - MultiAgenda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}" />
    <style>
      body {
        background-color: #1a1d20 !important;
        background-image: linear-gradient(
          180deg,
          #212529 0%,
          #051937 100%
        ) !important;
        background-attachment: fixed;
        background-size: cover;
      }
      .ui-card-glass {
        background-color: rgb(29, 32, 36) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
      }
      .bg-body-tertiary {
        background-color: rgba(27, 30, 33, 0.95) !important;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div
        class="card p-4 shadow ui-card-glass"
        style="width: 100%; max-width: 400px"
      >
        <div class="text-center mb-4">
          <img
            src="{% static 'img/tudo.png' %}"
            alt="Logo MultiAgenda"
            class="img-fluid"
            style="max-height: 100px"
          />
        </div>

        {% if erro %}
        <div class="alert alert-danger text-center small p-2 mb-3" role="alert">
          {{ erro }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
          {% csrf_token %}

          <div class="mb-3">
            <input
              type="text"
              name="login"
              class="form-control bg-dark text-light border-secondary"
              placeholder="Empresa.Usuário"
              required
            />
          </div>

          <div class="mb-4">
            <input
              type="password"
              name="senha"
              class="form-control bg-dark text-light border-secondary"
              placeholder="Senha"
              required
            />
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 fw-bold neon-btn mb-3"
          >
            Entrar
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
